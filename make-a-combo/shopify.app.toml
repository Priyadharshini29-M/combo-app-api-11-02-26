# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f5c2cbb3e511079397eeaa68d16259ae"
name = "Combo Forge"
application_url = "https://combo-forge.fly.dev/"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_content,write_content,read_script_tags,write_script_tags,write_discounts,read_discounts,read_themes,read_orders,write_orders"

[auth]
redirect_urls = [
  "https://combo-forge.fly.dev/auth/callback",
  "https://combo-forge.fly.dev/auth/shopify/callback",
  "https://combo-forge.fly.dev/api/auth/callback"
]

[app_proxy]
url = "https://int.thecomboforge.com"
subpath = "combo"
prefix = "apps"